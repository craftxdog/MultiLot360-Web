name: Web CI/CD

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]
  workflow_dispatch:
    inputs:
      target:
        description: "Qué ejecutar manualmente"
        required: true
        default: verify
        type: choice
        options:
          - verify
          - preview
          - production
          - desktop
      desktop_url:
        description: "URL pública que abrirá la app desktop. Si queda vacía, el instalador pedirá la URL al iniciar."
        required: false
        type: string
      release_tag:
        description: "Tag del release desktop"
        required: false
        default: desktop-v0.1.0
        type: string
      release_name:
        description: "Nombre visible del release desktop"
        required: false
        default: MultiLot 360 Desktop v0.1.0
        type: string

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  VERCEL_CLI_VERSION: 54.21.1

jobs:
  policy:
    name: Policy and branch rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch policy
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            case "${{ github.base_ref }}" in
              develop|master) ;;
              *)
                echo "::error::Pull requests only target develop or master."
                exit 1
                ;;
            esac
            exit 0
          fi

          case "${GITHUB_REF_NAME}" in
            develop|master) ;;
            *)
              echo "::error::Only develop and master are release-controlled branches."
              exit 1
              ;;
          esac

      - name: Validate manual production dispatch
        if: github.event_name == 'workflow_dispatch' && (inputs.target == 'production' || inputs.target == 'desktop')
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Production and desktop release jobs must run from master."
            exit 1
          fi

      - name: Require master and develop sync before production publication
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          git fetch origin develop master
          DEVELOP_SHA="$(git rev-parse origin/develop)"
          MASTER_SHA="$(git rev-parse origin/master)"

          echo "origin/develop=${DEVELOP_SHA}"
          echo "origin/master=${MASTER_SHA}"

          if [ "${DEVELOP_SHA}" != "${MASTER_SHA}" ]; then
            echo "::error::master and develop must point to the same commit before publishing production artifacts."
            exit 1
          fi

  verify:
    name: Lint, types, tests and build
    needs: policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint web app
        run: bun run lint:web

      - name: Typecheck web app
        run: bun run typecheck:web

      - name: Run web tests
        run: bun run test:web

      - name: Build web app
        run: bun run build:web
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:8080' }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3000' }}

  docker-image:
    name: Publish GHCR image
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:8080' }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  vercel-preview:
    name: Deploy Vercel preview
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      HAS_VERCEL_CONFIG: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    steps:
      - name: Skip when Vercel secrets are missing
        if: env.HAS_VERCEL_CONFIG != 'true'
        run: |
          echo "::notice::Vercel preview deploy skipped. Configure VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID to enable it."

      - name: Checkout repository
        if: env.HAS_VERCEL_CONFIG == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.HAS_VERCEL_CONFIG == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned Vercel CLI
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull preview environment
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build preview artifact
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy preview artifact
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --target=preview --token="${VERCEL_TOKEN}")"
          echo "Preview deployment: ${DEPLOYMENT_URL}"
          echo "### Preview deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "${DEPLOYMENT_URL}" >> "${GITHUB_STEP_SUMMARY}"

  vercel-production:
    name: Deploy Vercel production
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    needs: [verify, docker-image]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      HAS_VERCEL_CONFIG: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    steps:
      - name: Skip when Vercel secrets are missing
        if: env.HAS_VERCEL_CONFIG != 'true'
        run: |
          echo "::notice::Vercel production deploy skipped. Configure VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID to enable it."

      - name: Checkout repository
        if: env.HAS_VERCEL_CONFIG == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.HAS_VERCEL_CONFIG == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned Vercel CLI
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull production environment
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build production artifact
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy production artifact
        if: env.HAS_VERCEL_CONFIG == 'true'
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}")"
          echo "Production deployment: ${DEPLOYMENT_URL}"
          echo "### Production deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "${DEPLOYMENT_URL}" >> "${GITHUB_STEP_SUMMARY}"

  desktop-installers:
    name: Build desktop installers
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'desktop'
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: macos-arm64
            rust-target: aarch64-apple-darwin
            tauri-args: --ci --target aarch64-apple-darwin --bundles dmg
          - os: macos-15-intel
            artifact: macos-x64
            rust-target: x86_64-apple-darwin
            tauri-args: --ci --target x86_64-apple-darwin --bundles dmg
          - os: windows-latest
            artifact: windows-x64
            rust-target: ""
            tauri-args: --ci --bundles nsis
    env:
      MULTILOT_DESKTOP_URL: ${{ inputs.desktop_url || vars.MULTILOT_DESKTOP_URL || vars.NEXT_PUBLIC_APP_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate desktop target URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MULTILOT_DESKTOP_URL}" ]; then
            echo "::notice::MULTILOT_DESKTOP_URL is empty. The desktop app will show the connection screen on first launch."
            exit 0
          fi

          case "${MULTILOT_DESKTOP_URL}" in
            http://*|https://*) ;;
            *)
              echo "::error::MULTILOT_DESKTOP_URL must start with http:// or https://."
              exit 1
              ;;
          esac

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer
        shell: bash
        run: |
          set -euo pipefail
          bun --cwd apps/desktop tauri build ${{ matrix.tauri-args }}

      - name: Collect installer artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p desktop-artifacts

          echo "Installer candidates generated by Tauri:"
          find apps/desktop/src-tauri/target -type f \( -name '*.dmg' -o -name '*.exe' \) -print | sort

          while IFS= read -r artifact; do
            cp "${artifact}" desktop-artifacts/
          done < <(find apps/desktop/src-tauri/target -type f \( -name '*.dmg' -o -name '*.exe' \))

          if [ -z "$(find desktop-artifacts -type f -print -quit)" ]; then
            echo "::error::Tauri build completed but no .dmg or .exe installer was found."
            find apps/desktop/src-tauri/target -maxdepth 6 -type f | sort | tail -n 120
            exit 1
          fi

          ls -lh desktop-artifacts

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: multilot-360-${{ matrix.artifact }}
          path: desktop-artifacts/**/*
          if-no-files-found: error

  desktop-release:
    name: Publish desktop release
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'desktop'
    needs: desktop-installers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ inputs.release_tag || 'desktop-v0.1.0' }}
      RELEASE_NAME: ${{ inputs.release_name || 'MultiLot 360 Desktop v0.1.0' }}
      MULTILOT_DESKTOP_URL: ${{ inputs.desktop_url || vars.MULTILOT_DESKTOP_URL || vars.NEXT_PUBLIC_APP_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/raw

      - name: Normalize release asset names
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          MAC_ARM="$(find release-assets/raw/multilot-360-macos-arm64 -type f -name '*.dmg' | head -n 1)"
          MAC_X64="$(find release-assets/raw/multilot-360-macos-x64 -type f -name '*.dmg' | head -n 1)"
          WIN_X64="$(find release-assets/raw/multilot-360-windows-x64 -type f -name '*.exe' | head -n 1)"

          if [ -z "${MAC_ARM}" ] || [ -z "${MAC_X64}" ] || [ -z "${WIN_X64}" ]; then
            echo "::error::Missing one or more desktop installer artifacts."
            find release-assets/raw -type f | sort
            exit 1
          fi

          cp "${MAC_ARM}" release-assets/MultiLot-360-macOS-arm64.dmg
          cp "${MAC_X64}" release-assets/MultiLot-360-macOS-x64.dmg
          cp "${WIN_X64}" release-assets/MultiLot-360-Windows-x64-Setup.exe

          ls -lh release-assets/MultiLot-360-*

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${RELEASE_TAG:-desktop-v0.1.0}"
          RELEASE_NAME="${RELEASE_NAME:-MultiLot 360 Desktop v0.1.0}"

          cat > release-body.md <<'EOF'
          MultiLot 360 para escritorio.

          Descargas:
          - macOS Apple Silicon: MultiLot-360-macOS-arm64.dmg
          - macOS Intel: MultiLot-360-macOS-x64.dmg
          - Windows x64: MultiLot-360-Windows-x64-Setup.exe

          Si el instalador fue generado sin URL pública embebida, la app mostrará una pantalla de conexión en el primer inicio para indicar la URL del sistema MultiLot 360.
          EOF

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-body.md
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-body.md
          fi

          gh release upload "${RELEASE_TAG}" release-assets/MultiLot-360-* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

          echo "### Desktop release" >> "${GITHUB_STEP_SUMMARY}"
          echo "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" >> "${GITHUB_STEP_SUMMARY}"
