name: Web CI/CD

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]
  workflow_dispatch:
    inputs:
      target:
        description: "Qué ejecutar manualmente"
        required: true
        default: verify
        type: choice
        options:
          - verify
          - development
          - production
          - desktop
      desktop_url:
        description: "URL pública que abrirá la app desktop. Si queda vacía, el instalador pedirá la URL al iniciar."
        required: false
        type: string
      release_tag:
        description: "Tag del release desktop"
        required: false
        default: desktop-v0.1.0
        type: string
      release_name:
        description: "Nombre visible del release desktop"
        required: false
        default: MultiLot 360 Desktop v0.1.0
        type: string

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11

jobs:
  policy:
    name: Policy and branch rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch policy
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            case "${{ github.base_ref }}" in
              develop|master) ;;
              *)
                echo "::error::Pull requests only target develop or master."
                exit 1
                ;;
            esac
            exit 0
          fi

          case "${GITHUB_REF_NAME}" in
            develop|master) ;;
            *)
              echo "::error::Only develop and master are release-controlled branches."
              exit 1
              ;;
          esac

      - name: Validate manual deployment dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.target != 'verify'
        run: |
          set -euo pipefail

          if [ "${{ inputs.target }}" = "development" ] && [ "${GITHUB_REF_NAME}" != "develop" ]; then
            echo "::error::Development deploy jobs must run from develop."
            exit 1
          fi

          if [ "${{ inputs.target }}" != "development" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Production and desktop release jobs must run from master."
            exit 1
          fi

      - name: Require master and develop sync before production publication
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
        run: |
          set -euo pipefail
          git fetch origin develop master
          DEVELOP_SHA="$(git rev-parse origin/develop)"
          MASTER_SHA="$(git rev-parse origin/master)"

          echo "origin/develop=${DEVELOP_SHA}"
          echo "origin/master=${MASTER_SHA}"

          if [ "${DEVELOP_SHA}" != "${MASTER_SHA}" ]; then
            echo "::error::master and develop must point to the same commit before publishing production artifacts."
            exit 1
          fi

  verify:
    name: Lint, types, tests and build
    needs: policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint web app
        run: bun run lint:web

      - name: Typecheck web app
        run: bun run typecheck:web

      - name: Run web tests
        run: bun run test:web

      - name: Build web app
        run: bun run build:web
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:8080' }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3000/api/v1' }}

  docker-image:
    name: Build and publish GHCR image
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'development' || inputs.target == 'production'))
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || 'development' }}
    outputs:
      image: ${{ steps.image.outputs.image }}
      primary-tag: ${{ steps.image.outputs.primary_tag }}
      immutable-tag: ${{ steps.image.outputs.immutable_tag }}
    env:
      IMAGE_CHANNEL: ${{ github.ref_name == 'master' && 'production' || 'development' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_DESKTOP_RELEASE_URL: ${{ vars.NEXT_PUBLIC_DESKTOP_RELEASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate public build variables
        run: |
          set -euo pipefail

          if [ -z "${NEXT_PUBLIC_APP_URL}" ]; then
            echo "::error::Configure NEXT_PUBLIC_APP_URL as a GitHub Environment variable for ${IMAGE_CHANNEL}."
            exit 1
          fi

          if [ -z "${NEXT_PUBLIC_API_URL}" ]; then
            echo "::error::Configure NEXT_PUBLIC_API_URL as a GitHub Environment variable for ${IMAGE_CHANNEL}. Include the API prefix, for example https://api.example.com/api/v1."
            exit 1
          fi

          case "${NEXT_PUBLIC_APP_URL}" in
            http://*|https://*) ;;
            *)
              echo "::error::NEXT_PUBLIC_APP_URL must start with http:// or https://."
              exit 1
              ;;
          esac

          case "${NEXT_PUBLIC_API_URL}" in
            http://*|https://*) ;;
            *)
              echo "::error::NEXT_PUBLIC_API_URL must start with http:// or https://."
              exit 1
              ;;
          esac

      - name: Prepare image tags
        id: image
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHORT_SHA="${GITHUB_SHA::12}"
          IMMUTABLE_TAG="${IMAGE_CHANNEL}-${SHORT_SHA}"

          {
            echo "image=${IMAGE}"
            echo "primary_tag=${IMAGE_CHANNEL}"
            echo "immutable_tag=${IMMUTABLE_TAG}"
            echo "tags<<EOF"
            echo "${IMAGE}:${IMAGE_CHANNEL}"
            echo "${IMAGE}:${IMMUTABLE_TAG}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            if [ "${IMAGE_CHANNEL}" = "production" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          echo "### GHCR image" >> "${GITHUB_STEP_SUMMARY}"
          echo "${IMAGE}:${IMAGE_CHANNEL}" >> "${GITHUB_STEP_SUMMARY}"
          echo "${IMAGE}:${IMMUTABLE_TAG}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DESKTOP_RELEASE_URL=${{ env.NEXT_PUBLIC_DESKTOP_RELEASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dokploy-deploy:
    name: Deploy with Dokploy
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'development' || inputs.target == 'production'))
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || 'development' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'master' && 'production' || 'development' }}
      IMAGE_REF: ${{ needs.docker-image.outputs.image }}:${{ needs.docker-image.outputs.primary-tag }}
      IMMUTABLE_IMAGE_REF: ${{ needs.docker-image.outputs.image }}:${{ needs.docker-image.outputs.immutable-tag }}
      DOKPLOY_URL: ${{ vars.DOKPLOY_URL || secrets.DOKPLOY_URL }}
      DOKPLOY_APPLICATION_ID: ${{ vars.DOKPLOY_APPLICATION_ID || secrets.DOKPLOY_APPLICATION_ID }}
      DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
      DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
    steps:
      - name: Validate Dokploy configuration
        id: dokploy-config
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_API_TOKEN}" ] && [ -z "${DOKPLOY_WEBHOOK_URL}" ]; then
            if [ "${DEPLOY_ENV}" = "production" ]; then
              echo "::error::Configure DOKPLOY_API_TOKEN + DOKPLOY_APPLICATION_ID, or DOKPLOY_WEBHOOK_URL, in the production GitHub Environment."
              exit 1
            fi

            echo "::notice::No Dokploy secret configured for ${DEPLOY_ENV}; the image was published but deployment is skipped."
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${DOKPLOY_API_TOKEN}" ]; then
            if [ -z "${DOKPLOY_URL}" ]; then
              echo "::error::Configure DOKPLOY_URL for API deployments, for example https://dokploy.alphaby.cloud."
              exit 1
            fi

            if [ -z "${DOKPLOY_APPLICATION_ID}" ]; then
              echo "::error::Configure DOKPLOY_APPLICATION_ID for the ${DEPLOY_ENV} environment."
              exit 1
            fi
          fi

          echo "configured=true" >> "${GITHUB_OUTPUT}"

      - name: Trigger Dokploy deployment
        if: steps.dokploy-config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          echo "Deploying ${IMAGE_REF} to ${DEPLOY_ENV}."

          if [ -n "${DOKPLOY_API_TOKEN}" ]; then
            DOKPLOY_BASE_URL="${DOKPLOY_URL%/}"
            curl --fail-with-body --silent --show-error \
              --request POST \
              "${DOKPLOY_BASE_URL}/api/application.deploy" \
              --header "accept: application/json" \
              --header "content-type: application/json" \
              --header "x-api-key: ${DOKPLOY_API_TOKEN}" \
              --data "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\"}" \
              --output dokploy-response.json
          else
            curl --fail-with-body --silent --show-error \
              --request POST \
              "${DOKPLOY_WEBHOOK_URL}" \
              --header "content-type: application/json" \
              --data "{\"source\":\"github-actions\",\"environment\":\"${DEPLOY_ENV}\",\"branch\":\"${GITHUB_REF_NAME}\",\"image\":\"${IMAGE_REF}\",\"immutableImage\":\"${IMMUTABLE_IMAGE_REF}\",\"sha\":\"${GITHUB_SHA}\"}" \
              --output dokploy-response.json
          fi

          echo "### Dokploy deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "Environment: ${DEPLOY_ENV}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Image: ${IMAGE_REF}" >> "${GITHUB_STEP_SUMMARY}"

  desktop-installers:
    name: Build desktop installers
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'desktop'
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: macos-arm64
            rust-target: aarch64-apple-darwin
            tauri-args: --ci --target aarch64-apple-darwin --bundles dmg
          - os: macos-15-intel
            artifact: macos-x64
            rust-target: x86_64-apple-darwin
            tauri-args: --ci --target x86_64-apple-darwin --bundles dmg
          - os: windows-latest
            artifact: windows-x64
            rust-target: ""
            tauri-args: --ci --bundles nsis
    env:
      MULTILOT_DESKTOP_URL: ${{ inputs.desktop_url || vars.MULTILOT_DESKTOP_URL || vars.NEXT_PUBLIC_APP_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate desktop target URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MULTILOT_DESKTOP_URL}" ]; then
            echo "::notice::MULTILOT_DESKTOP_URL is empty. The desktop app will show the connection screen on first launch."
            exit 0
          fi

          case "${MULTILOT_DESKTOP_URL}" in
            http://*|https://*) ;;
            *)
              echo "::error::MULTILOT_DESKTOP_URL must start with http:// or https://."
              exit 1
              ;;
          esac

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer
        shell: bash
        run: |
          set -euo pipefail
          bun --cwd apps/desktop tauri build ${{ matrix.tauri-args }}

      - name: Collect installer artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p desktop-artifacts

          echo "Installer candidates generated by Tauri:"
          find apps/desktop/src-tauri/target -type f \( -name '*.dmg' -o -name '*.exe' \) -print | sort

          while IFS= read -r artifact; do
            cp "${artifact}" desktop-artifacts/
          done < <(find apps/desktop/src-tauri/target -type f \( -name '*.dmg' -o -name '*.exe' \))

          if [ -z "$(find desktop-artifacts -type f -print -quit)" ]; then
            echo "::error::Tauri build completed but no .dmg or .exe installer was found."
            find apps/desktop/src-tauri/target -maxdepth 6 -type f | sort | tail -n 120
            exit 1
          fi

          ls -lh desktop-artifacts

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: multilot-360-${{ matrix.artifact }}
          path: desktop-artifacts/**/*
          if-no-files-found: error

  desktop-release:
    name: Publish desktop release
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'desktop'
    needs: desktop-installers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ inputs.release_tag || 'desktop-v0.1.0' }}
      RELEASE_NAME: ${{ inputs.release_name || 'MultiLot 360 Desktop v0.1.0' }}
      MULTILOT_DESKTOP_URL: ${{ inputs.desktop_url || vars.MULTILOT_DESKTOP_URL || vars.NEXT_PUBLIC_APP_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/raw

      - name: Normalize release asset names
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          MAC_ARM="$(find release-assets/raw/multilot-360-macos-arm64 -type f -name '*.dmg' | head -n 1)"
          MAC_X64="$(find release-assets/raw/multilot-360-macos-x64 -type f -name '*.dmg' | head -n 1)"
          WIN_X64="$(find release-assets/raw/multilot-360-windows-x64 -type f -name '*.exe' | head -n 1)"

          if [ -z "${MAC_ARM}" ] || [ -z "${MAC_X64}" ] || [ -z "${WIN_X64}" ]; then
            echo "::error::Missing one or more desktop installer artifacts."
            find release-assets/raw -type f | sort
            exit 1
          fi

          cp "${MAC_ARM}" release-assets/MultiLot-360-macOS-arm64.dmg
          cp "${MAC_X64}" release-assets/MultiLot-360-macOS-x64.dmg
          cp "${WIN_X64}" release-assets/MultiLot-360-Windows-x64-Setup.exe

          ls -lh release-assets/MultiLot-360-*

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${RELEASE_TAG:-desktop-v0.1.0}"
          RELEASE_NAME="${RELEASE_NAME:-MultiLot 360 Desktop v0.1.0}"

          cat > release-body.md <<'EOF'
          MultiLot 360 para escritorio.

          Descargas:
          - macOS Apple Silicon: MultiLot-360-macOS-arm64.dmg
          - macOS Intel: MultiLot-360-macOS-x64.dmg
          - Windows x64: MultiLot-360-Windows-x64-Setup.exe

          Si el instalador fue generado sin URL pública embebida, la app mostrará una pantalla de conexión en el primer inicio para indicar la URL del sistema MultiLot 360.
          EOF

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-body.md
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-body.md
          fi

          gh release upload "${RELEASE_TAG}" release-assets/MultiLot-360-* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

          echo "### Desktop release" >> "${GITHUB_STEP_SUMMARY}"
          echo "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" >> "${GITHUB_STEP_SUMMARY}"
