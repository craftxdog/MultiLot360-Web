<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiLot 360</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #090909;
        color: #f5f5f5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 40px));
        border: 1px solid color-mix(in srgb, currentColor 12%, transparent);
        border-radius: 28px;
        padding: 28px;
        background: color-mix(in srgb, canvas 92%, transparent);
        box-shadow: 0 30px 90px -60px #000;
      }

      p {
        line-height: 1.7;
        color: color-mix(in srgb, currentColor 70%, transparent);
      }

      code {
        display: inline-block;
        margin-top: 8px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, currentColor 12%, transparent);
        padding: 8px 12px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MultiLot 360 Desktop</h1>
      <p>
        Esta pantalla local sólo aparece si la ventana nativa no recibió una URL
        de producción. Configura <code>MULTILOT_DESKTOP_URL</code> en CI para
        generar instaladores conectados a tu sistema.
      </p>
    </main>
  </body>
</html>
